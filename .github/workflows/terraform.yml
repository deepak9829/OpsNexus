name: Terraform

# Trigger strategy — single main branch:
#   pull_request → main : plan only, posts diff as PR comment
#   push → main         : plan + apply (PR merge)
#
# Environment matrix is derived from which folders changed:
#   terraform/environments/dev/**  or terraform/modules/** → dev
#   terraform/environments/staging/**                      → staging
#   terraform/environments/prod/**                         → prod
# All detected environments run in parallel as a matrix.

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Action'
        required: true
        type: choice
        options: [plan, apply]

env:
  TF_VERSION: '1.10.0'
  STATE_BUCKET_REGION: 'ap-southeast-1'
  STATE_BUCKET: 'opsnexus-tf-state'
  TF_INPUT: false

jobs:
  resolve:
    name: Resolve environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.resolve.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVS='["${{ github.event.inputs.environment }}"]'
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
            else
              BASE="${{ github.event.before }}"
            fi
            CHANGED=$(git diff --name-only "${BASE}" "${{ github.sha }}" 2>/dev/null \
                      || git diff --name-only HEAD~1 HEAD)

            echo "Changed files:"
            echo "$CHANGED"

            ENVS="[]"
            if echo "$CHANGED" | grep -qE "^terraform/environments/dev/|^terraform/modules/|^\.github/workflows/terraform\.yml"; then
              ENVS=$(echo "$ENVS" | jq -c '. + ["dev"]')
            fi
            if echo "$CHANGED" | grep -q "^terraform/environments/staging/"; then
              ENVS=$(echo "$ENVS" | jq -c '. + ["staging"]')
            fi
            if echo "$CHANGED" | grep -q "^terraform/environments/prod/"; then
              ENVS=$(echo "$ENVS" | jq -c '. + ["prod"]')
            fi
            # Default to dev if nothing matched (e.g. workflow file only)
            if [ "$ENVS" = "[]" ]; then
              ENVS='["dev"]'
            fi
          fi

          echo "Detected environments: ${ENVS}"
          echo "environments=${ENVS}" >> "$GITHUB_OUTPUT"

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.resolve.outputs.environments) }}
    environment: ${{ matrix.environment }}-plan
    concurrency:
      group: terraform-${{ github.ref }}-${{ matrix.environment }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment config
        id: cfg
        run: |
          case "${{ matrix.environment }}" in
            dev)     REGION="ap-south-1" ;;
            staging) REGION="ap-southeast-1" ;;
            prod)    REGION="ap-southeast-1" ;;
          esac
          echo "aws_region=${REGION}"                                                    >> "$GITHUB_OUTPUT"
          echo "backend_file=../../../terraform/backends/${{ matrix.environment }}.hcl" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${{ matrix.environment }}.tfvars"                           >> "$GITHUB_OUTPUT"
          echo "tf_dir=terraform/environments/${{ matrix.environment }}"                >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.cfg.outputs.aws_region }}
          role-session-name: GHATerraformPlan-${{ github.run_id }}-${{ matrix.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          terraform init \
            -backend-config="${{ steps.cfg.outputs.backend_file }}" \
            -backend-config="profile=" \
            -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Validate
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          set +o pipefail
          terraform plan \
            -var-file="${{ steps.cfg.outputs.tfvars_file }}" \
            -var="aws_profile=" \
            -out=tfplan.binary \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Terraform exit code: ${EXIT_CODE}"

          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "plan_changed=false" >> "$GITHUB_OUTPUT"
          elif [ "${EXIT_CODE}" -eq 2 ]; then
            echo "plan_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform plan failed with exit code ${EXIT_CODE}" >&2
            exit 1
          fi

      - name: Upload plan to S3
        if: steps.plan.outputs.plan_changed == 'true'
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          aws s3 cp tfplan.binary \
            s3://${{ env.STATE_BUCKET }}/plans/${{ matrix.environment }}/run-${{ github.run_id }}.tfplan
          aws s3 cp plan_output.txt \
            s3://${{ env.STATE_BUCKET }}/plans/${{ matrix.environment }}/run-${{ github.run_id }}.txt
          echo "Plan uploaded to S3 for run ${{ github.run_id }}"

      - name: Checkov security scan
        if: steps.plan.outputs.plan_changed == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ steps.cfg.outputs.tf_dir }}
          config_file: terraform/.checkov.yaml
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
        continue-on-error: true

      - name: Upload Checkov SARIF
        if: steps.plan.outputs.plan_changed == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.plan_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ steps.cfg.outputs.tf_dir }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...truncated' : plan;
            const body = [
              `## Terraform Plan — \`${{ matrix.environment }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Run: ${{ github.run_id }} | Plan stored in S3 — will auto-apply on merge*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [resolve, plan]
    # Only apply on push to main (PR merge) or manual workflow_dispatch apply.
    # fail-fast:false in plan means plan.result is 'success' only when ALL envs planned OK.
    if: |
      needs.plan.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
      )
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.resolve.outputs.environments) }}
    environment: ${{ matrix.environment }}-deploy
    concurrency:
      group: terraform-apply-${{ github.ref }}-${{ matrix.environment }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment config
        id: cfg
        run: |
          case "${{ matrix.environment }}" in
            dev)     REGION="ap-south-1" ;;
            staging) REGION="ap-southeast-1" ;;
            prod)    REGION="ap-southeast-1" ;;
          esac
          echo "aws_region=${REGION}"                                                    >> "$GITHUB_OUTPUT"
          echo "backend_file=../../../terraform/backends/${{ matrix.environment }}.hcl" >> "$GITHUB_OUTPUT"
          echo "tf_dir=terraform/environments/${{ matrix.environment }}"                >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.cfg.outputs.aws_region }}
          role-session-name: GHATerraformApply-${{ github.run_id }}-${{ matrix.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          terraform init \
            -backend-config="${{ steps.cfg.outputs.backend_file }}" \
            -backend-config="profile=" \
            -reconfigure

      - name: Download plan from S3
        id: download
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          if aws s3 cp \
            s3://${{ env.STATE_BUCKET }}/plans/${{ matrix.environment }}/run-${{ github.run_id }}.tfplan \
            tfplan.binary 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No plan found for ${{ matrix.environment }} — no changes to apply"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        if: steps.download.outputs.found == 'true'
        working-directory: ${{ steps.cfg.outputs.tf_dir }}
        run: |
          terraform apply -auto-approve tfplan.binary

      - name: Summary
        run: |
          if [ "${{ steps.download.outputs.found }}" = "true" ]; then
            echo "### Terraform Apply Complete" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No Changes — Skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Environment: \`${{ matrix.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
