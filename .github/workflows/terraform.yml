name: Terraform

# Trigger strategy — single main branch:
#   pull_request → main : plan only, posts diff as PR comment
#   push → main         : plan + apply (PR merge)
#
# Environment is derived from which folder changed:
#   terraform/environments/dev/**  or terraform/modules/** → dev
#   terraform/environments/staging/**                      → staging
#   terraform/environments/prod/**                         → prod

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Action'
        required: true
        type: choice
        options: [plan, apply]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: '1.10.0'
  STATE_BUCKET_REGION: 'ap-southeast-1'
  STATE_BUCKET: 'opsnexus-tf-state'
  TF_INPUT: false

jobs:
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment:   ${{ steps.resolve.outputs.environment }}
      aws_region:    ${{ steps.resolve.outputs.aws_region }}
      backend_file:  ${{ steps.resolve.outputs.backend_file }}
      tfvars_file:   ${{ steps.resolve.outputs.tfvars_file }}
      tf_dir:        ${{ steps.resolve.outputs.tf_dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect environment from changed paths
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            # Diff against the base: PR base SHA or previous commit on push
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
            else
              BASE="${{ github.event.before }}"
            fi
            CHANGED=$(git diff --name-only "${BASE}" "${{ github.sha }}" 2>/dev/null \
                      || git diff --name-only HEAD~1 HEAD)

            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -q "^terraform/environments/prod/"; then
              ENV="prod"
            elif echo "$CHANGED" | grep -q "^terraform/environments/staging/"; then
              ENV="staging"
            else
              # dev folder, any module change, or workflow file → dev
              ENV="dev"
            fi
          fi

          case "${ENV}" in
            dev)     REGION="ap-south-1" ;;
            staging) REGION="ap-southeast-1" ;;
            prod)    REGION="ap-southeast-1" ;;
          esac

          echo "environment=${ENV}"                                  >> "$GITHUB_OUTPUT"
          echo "aws_region=${REGION}"                                >> "$GITHUB_OUTPUT"
          echo "backend_file=../../../terraform/backends/${ENV}.hcl" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${ENV}.tfvars"                           >> "$GITHUB_OUTPUT"
          echo "tf_dir=terraform/environments/${ENV}"                >> "$GITHUB_OUTPUT"
          echo "Resolved → environment: ${ENV}, region: ${REGION}"

  plan:
    name: Plan (${{ needs.resolve.outputs.environment }})
    runs-on: ubuntu-latest
    needs: resolve
    environment: ${{ needs.resolve.outputs.environment }}-plan
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write
    outputs:
      plan_changed: ${{ steps.plan.outputs.plan_changed }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}
          role-session-name: GHATerraformPlan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: |
          terraform init \
            -backend-config="${{ needs.resolve.outputs.backend_file }}" \
            -reconfigure

      - name: Terraform Format Check
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: |
          set +e
          terraform plan \
            -var-file="${{ needs.resolve.outputs.tfvars_file }}" \
            -out=tfplan.binary \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan_output.txt
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "plan_changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "plan_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform plan failed" >&2
            exit 1
          fi

          terraform show -json tfplan.binary > tfplan.json

      - name: Upload plan to S3
        if: steps.plan.outputs.plan_changed == 'true'
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: |
          aws s3 cp tfplan.binary \
            s3://${{ env.STATE_BUCKET }}/plans/${{ needs.resolve.outputs.environment }}/run-${{ github.run_id }}.tfplan
          aws s3 cp tfplan.json \
            s3://${{ env.STATE_BUCKET }}/plans/${{ needs.resolve.outputs.environment }}/run-${{ github.run_id }}.json

      - name: Checkov security scan
        if: steps.plan.outputs.plan_changed == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ needs.resolve.outputs.tf_dir }}
          config_file: terraform/.checkov.yaml
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
        continue-on-error: true

      - name: Upload Checkov SARIF
        if: steps.plan.outputs.plan_changed == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.plan_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ needs.resolve.outputs.tf_dir }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...truncated' : plan;
            const body = [
              `## Terraform Plan — \`${{ needs.resolve.outputs.environment }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Run: ${{ github.run_id }} | Plan stored in S3 — will auto-apply on merge*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: Apply (${{ needs.resolve.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [resolve, plan]
    # Only apply on push to main (PR merge) or manual workflow_dispatch apply
    if: |
      needs.plan.outputs.plan_changed == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
      )
    environment: ${{ needs.resolve.outputs.environment }}-deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}
          role-session-name: GHATerraformApply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: |
          terraform init \
            -backend-config="${{ needs.resolve.outputs.backend_file }}" \
            -reconfigure

      - name: Download plan from S3
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: |
          aws s3 cp \
            s3://${{ env.STATE_BUCKET }}/plans/${{ needs.resolve.outputs.environment }}/run-${{ github.run_id }}.tfplan \
            tfplan.binary

      - name: Terraform Apply
        working-directory: ${{ needs.resolve.outputs.tf_dir }}
        run: terraform apply -auto-approve tfplan.binary

      - name: Summary
        run: |
          echo "### Terraform Apply Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: \`${{ needs.resolve.outputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
