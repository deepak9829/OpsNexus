name: Deploy to EKS

# Trigger strategy — single main branch:
#   workflow_run  : fires automatically after build-push succeeds on main
#   push → main   : fires when k8s manifest files change (no image rebuild needed)
#   workflow_dispatch : manual deploy with optional image tag override
#
# Environment is derived from which k8s overlay folder changed:
#   k8s/overlays/dev/**  or k8s/base/** or k8s/external-secrets/** → dev
#   k8s/overlays/staging/**                                         → staging
#   k8s/overlays/prod/**                                            → prod

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/deploy-k8s.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: 'Image tag to deploy (default: latest commit SHA)'
        required: false

concurrency:
  group: deploy-eks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      environment:        ${{ steps.resolve.outputs.environment }}
      aws_region:         ${{ steps.resolve.outputs.aws_region }}
      image_tag:          ${{ steps.resolve.outputs.image_tag }}
      cluster_name:       ${{ steps.resolve.outputs.cluster_name }}
      karpenter_role_arn: ${{ steps.resolve.outputs.karpenter_role_arn }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect environment and image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            TAG="${{ github.event.inputs.image_tag || github.sha }}"

          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Triggered by build-push — always dev (main branch = dev)
            ENV="dev"
            TAG="${{ github.event.workflow_run.head_sha }}"

          else
            # push event: detect from which k8s overlay changed
            BASE="${{ github.event.before }}"
            CHANGED=$(git diff --name-only "${BASE}" "${{ github.sha }}" 2>/dev/null \
                      || git diff --name-only HEAD~1 HEAD)

            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -q "^k8s/overlays/prod/"; then
              ENV="prod"
            elif echo "$CHANGED" | grep -q "^k8s/overlays/staging/"; then
              ENV="staging"
            else
              # base/, external-secrets/, karpenter/, or dev overlay → dev
              ENV="dev"
            fi
            TAG="${{ github.sha }}"
          fi

          case "${ENV}" in
            dev)     REGION="ap-south-1" ;;
            staging) REGION="ap-southeast-1" ;;
            prod)    REGION="ap-southeast-1" ;;
          esac

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          KARPENTER_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/opsnexus-${ENV}-karpenter-controller"

          echo "environment=${ENV}"                           >> "$GITHUB_OUTPUT"
          echo "aws_region=${REGION}"                         >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}"                             >> "$GITHUB_OUTPUT"
          echo "cluster_name=opsnexus-${ENV}-eks"            >> "$GITHUB_OUTPUT"
          echo "karpenter_role_arn=${KARPENTER_ROLE_ARN}"    >> "$GITHUB_OUTPUT"
          echo "Resolved → environment: ${ENV}, tag: ${TAG}"

  deploy:
    name: Deploy to EKS (${{ needs.resolve.outputs.environment }})
    runs-on: ubuntu-latest
    needs: resolve
    environment: ${{ needs.resolve.outputs.environment }}-deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}
          role-session-name: GHADeploy-${{ github.run_id }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.resolve.outputs.cluster_name }} \
            --region ${{ needs.resolve.outputs.aws_region }}

      - name: Fetch IRSA role ARNs from SSM
        id: irsa
        run: |
          ENV="${{ needs.resolve.outputs.environment }}"

          ESO_ROLE_ARN=$(aws ssm get-parameter \
            --name "/opsnexus/${ENV}/eso-irsa-role-arn" \
            --query "Parameter.Value" --output text)
          echo "eso_role_arn=${ESO_ROLE_ARN}" >> "$GITHUB_OUTPUT"

          NOTIFICATION_ROLE_ARN=$(aws ssm get-parameter \
            --name "/opsnexus/${ENV}/notification-irsa-role-arn" \
            --query "Parameter.Value" --output text)
          echo "notification_role_arn=${NOTIFICATION_ROLE_ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy Karpenter
        env:
          KARPENTER_VERSION: "1.13.0"
        run: |
          helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
            --version "${KARPENTER_VERSION}" \
            --namespace karpenter \
            --create-namespace \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${{ needs.resolve.outputs.karpenter_role_arn }}" \
            --set "settings.clusterName=${{ needs.resolve.outputs.cluster_name }}" \
            --set "settings.interruptionQueue=opsnexus-${{ needs.resolve.outputs.environment }}-karpenter-interruption" \
            --wait \
            --timeout 5m

      - name: Deploy External Secrets Operator
        env:
          ESO_VERSION: "0.14.0"
        run: |
          helm upgrade --install external-secrets \
            oci://ghcr.io/external-secrets/charts/external-secrets \
            --version "${ESO_VERSION}" \
            --namespace external-secrets \
            --create-namespace \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${{ steps.irsa.outputs.eso_role_arn }}" \
            --set "webhook.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${{ steps.irsa.outputs.eso_role_arn }}" \
            --set "certController.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${{ steps.irsa.outputs.eso_role_arn }}" \
            --wait \
            --timeout 5m

      - name: Deploy Traefik ingress controller
        run: |
          helm repo add traefik https://helm.traefik.io/traefik --force-update
          helm repo update
          helm upgrade --install traefik traefik/traefik \
            --namespace traefik \
            --create-namespace \
            --values k8s/traefik/values.yaml \
            --wait \
            --timeout 5m

      - name: Apply Karpenter NodeClass and NodePool
        env:
          PROJECT_NAME: opsnexus
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          NODE_ROLE_NAME: opsnexus-${{ needs.resolve.outputs.environment }}-node-role
        run: |
          envsubst < k8s/karpenter/ec2nodeclass.yaml | kubectl apply -f -
          envsubst < k8s/karpenter/nodepool.yaml     | kubectl apply -f -

      - name: Apply ClusterSecretStore
        env:
          AWS_REGION: ${{ needs.resolve.outputs.aws_region }}
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
        run: |
          envsubst < k8s/external-secrets/cluster-secret-store.yaml | kubectl apply -f -
          envsubst < k8s/external-secrets/rds-secret.yaml            | kubectl apply -f -
          envsubst < k8s/external-secrets/docdb-secret.yaml          | kubectl apply -f -
          envsubst < k8s/external-secrets/jwt-secret.yaml            | kubectl apply -f -

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags in kustomize overlay
        # Only update image tags when triggered by a successful image build.
        # Push events (manifest-only changes) must not override tags with an
        # unbuilt SHA — the overlay already carries the last-deployed tag.
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && needs.resolve.outputs.image_tag != '')
        working-directory: k8s/overlays/${{ needs.resolve.outputs.environment }}
        run: |
          ECR="${{ steps.login-ecr.outputs.registry }}"
          TAG="${{ needs.resolve.outputs.image_tag }}"

          for SVC in auth-service tenant-service workflow-service document-service notification-service; do
            kustomize edit set image "opsnexus/${SVC}=${ECR}/opsnexus/${SVC}:${TAG}"
          done

      - name: Apply Kustomize overlay
        env:
          NOTIFICATION_IRSA_ROLE_ARN: ${{ steps.irsa.outputs.notification_role_arn }}
          AWS_REGION: ${{ needs.resolve.outputs.aws_region }}
          PROJECT_NAME: opsnexus
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
        run: |
          kubectl kustomize k8s/overlays/${{ needs.resolve.outputs.environment }} \
            | envsubst \
            | kubectl apply --namespace opsnexus -f -

      - name: Apply Traefik IngressRoutes
        run: kubectl apply -f k8s/traefik/ingressroutes.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment \
            --namespace opsnexus \
            --timeout=600s

      - name: Verify pods
        run: |
          echo "=== Pods ==="
          kubectl get pods -n opsnexus -o wide
          echo "=== Services ==="
          kubectl get svc -n opsnexus

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment --namespace opsnexus || true

      - name: Summary
        run: |
          echo "### Deployed to EKS" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: \`${{ needs.resolve.outputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: \`${{ needs.resolve.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Cluster: \`${{ needs.resolve.outputs.cluster_name }}\`" >> "$GITHUB_STEP_SUMMARY"
