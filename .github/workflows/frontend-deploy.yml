name: Deploy Frontends

# Triggers on every merge to main (PR merge = push to main).
# Path filters ensure only relevant changes trigger a deploy:
#   - app source changes  → deploy that app
#   - workflow changes    → deploy both apps
# Manual dispatch lets you redeploy any app without a code change.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/customer-portal/**'
      - 'frontend/admin-console/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        type: choice
        options: [all, customer-portal, admin-console]
        default: all

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      aws_region:  ${{ steps.resolve.outputs.aws_region }}
      api_base_url: ${{ steps.resolve.outputs.api_base_url }}
      matrix:      ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve environment and build matrix
        id: resolve
        run: |
          # Single-branch strategy: main always deploys to dev
          ENV="dev"
          REGION="ap-south-1"
          API_BASE_URL="https://api.dev.opsnexus.site"

          echo "environment=${ENV}"         >> "$GITHUB_OUTPUT"
          echo "aws_region=${REGION}"       >> "$GITHUB_OUTPUT"
          echo "api_base_url=${API_BASE_URL}" >> "$GITHUB_OUTPUT"

          # Build the matrix dynamically so workflow_dispatch can target one app
          INPUT="${{ github.event.inputs.app }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${INPUT}" != "all" ] && [ -n "${INPUT}" ]; then
            echo "matrix=[\"${INPUT}\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["customer-portal","admin-console"]' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.resolve.outputs.matrix) }}
    environment: ${{ needs.resolve.outputs.environment }}-deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        env:
          NODE_ENV: production
          VITE_ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          VITE_API_BASE_URL: ${{ needs.resolve.outputs.api_base_url }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}
          role-session-name: GHAFrontend-${{ matrix.app }}-${{ github.run_id }}

      - name: Read deployment config from SSM
        id: ssm
        run: |
          APP_KEY=$(echo "${{ matrix.app }}" | tr '-' '_')
          ENV="${{ needs.resolve.outputs.environment }}"

          S3_BUCKET=$(aws ssm get-parameter \
            --name "/opsnexus/${ENV}/${APP_KEY}/s3_bucket" \
            --query 'Parameter.Value' --output text)

          S3_PREFIX=$(aws ssm get-parameter \
            --name "/opsnexus/${ENV}/${APP_KEY}/s3_prefix" \
            --query 'Parameter.Value' --output text)

          CF_ID=$(aws ssm get-parameter \
            --name "/opsnexus/${ENV}/${APP_KEY}/cloudfront_id" \
            --query 'Parameter.Value' --output text)

          echo "s3_bucket=${S3_BUCKET}"   >> "$GITHUB_OUTPUT"
          echo "s3_prefix=${S3_PREFIX}"   >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=${CF_ID}"   >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        working-directory: frontend/${{ matrix.app }}
        run: |
          S3_PATH="s3://${{ steps.ssm.outputs.s3_bucket }}/${{ steps.ssm.outputs.s3_prefix }}"

          # Hashed assets (JS/CSS chunks) — immutable long cache
          aws s3 sync dist/ "${S3_PATH}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html — never cache; browser always fetches the latest entry point
          aws s3 cp dist/index.html "${S3_PATH}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.ssm.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Summary
        run: |
          APP="${{ matrix.app }}"
          ENV="${{ needs.resolve.outputs.environment }}"
          [ "$APP" = "customer-portal" ] && SUB="app" || SUB="admin"
          echo "### Deployed: $APP" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: https://${SUB}.${ENV}.opsnexus.site" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
