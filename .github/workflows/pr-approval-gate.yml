name: PR Approval Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [staging, main]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-approval:
    name: Check PR has approved review with comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Check for approved review with non-empty comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const approvedWithComment = reviews.filter(review =>
              review.state === 'APPROVED' &&
              review.body &&
              review.body.trim().length > 0
            );

            if (approvedWithComment.length === 0) {
              core.warning(
                'PR requires at least one APPROVED review with a non-empty comment. ' +
                'Approve the PR and add a comment explaining the review.'
              );
            } else {
              const reviewer = approvedWithComment[0].user.login;
              const preview = approvedWithComment[0].body.slice(0, 100);
              core.info(
                `PR has required approved review with comment from @${reviewer}: "${preview}..."`
              );
            }
