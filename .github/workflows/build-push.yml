name: Build & Push Images

# Trigger strategy — single main branch:
#   push → main with services/** changes → build all changed services → push to dev ECR
#   PR   → main with services/** changes → build only (no push) for validation
#
# Images are environment-agnostic (tagged with SHA). The deploy-k8s workflow
# picks up the image SHA and rolls it out to the target environment.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated or "all")'
        required: false
        default: 'all'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: 'ap-south-1'

jobs:
  resolve:
    name: Resolve services matrix
    runs-on: ubuntu-latest
    outputs:
      matrix:    ${{ steps.resolve.outputs.matrix }}
      push_image: ${{ steps.resolve.outputs.push_image }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHAResolve-${{ github.run_id }}

      - name: Get AWS account ID
        id: account
        run: |
          echo "aws_account_id=$(aws sts get-caller-identity --query Account --output text)" \
            >> "$GITHUB_OUTPUT"

      - name: Build services matrix from changed paths
        id: resolve
        run: |
          ALL_SERVICES='["auth-service","tenant-service","workflow-service","document-service","notification-service"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.services }}"
            if [ "${INPUT}" = "all" ] || [ -z "${INPUT}" ]; then
              MATRIX="${ALL_SERVICES}"
            else
              # Convert comma-separated input to JSON array
              MATRIX=$(echo "${INPUT}" | tr ',' '\n' | jq -Rc '[.]' | jq -cs 'add')
            fi
            PUSH="true"
          else
            # Detect changed services via git diff
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
            else
              BASE="${{ github.event.before }}"
            fi
            CHANGED=$(git diff --name-only "${BASE}" "${{ github.sha }}" 2>/dev/null \
                      || git diff --name-only HEAD~1 HEAD)

            echo "Changed files:"
            echo "$CHANGED"

            SERVICES=()
            for SVC in auth-service tenant-service workflow-service document-service notification-service; do
              if echo "$CHANGED" | grep -q "^services/${SVC}/\|^\.github/workflows/build-push\.yml"; then
                SERVICES+=("\"${SVC}\"")
              fi
            done

            # If workflow file changed, build all services
            if echo "$CHANGED" | grep -q "^\.github/workflows/build-push\.yml"; then
              MATRIX="${ALL_SERVICES}"
            elif [ ${#SERVICES[@]} -eq 0 ]; then
              MATRIX="${ALL_SERVICES}"
            else
              MATRIX="[$(IFS=','; echo "${SERVICES[*]}")]"
            fi

            # Push only on merge to main, not on PR
            [ "${{ github.event_name }}" = "push" ] && PUSH="true" || PUSH="false"
          fi

          echo "matrix=${MATRIX}"       >> "$GITHUB_OUTPUT"
          echo "push_image=${PUSH}"     >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${{ steps.account.outputs.aws_account_id }}" >> "$GITHUB_OUTPUT"
          echo "Building: ${MATRIX} | Push: ${PUSH}"

  build:
    name: ${{ matrix.service }} (${{ needs.resolve.outputs.push_image == 'true' && 'build+push' || 'build only' }})
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.resolve.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHABuild-${{ matrix.service }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          BASE="${REGISTRY}/opsnexus/${{ matrix.service }}"
          echo "image_sha=${BASE}:${{ github.sha }}"     >> "$GITHUB_OUTPUT"
          echo "image_latest=${BASE}:latest"             >> "$GITHUB_OUTPUT"
          echo "image_dev=${BASE}:dev"                   >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve.outputs.push_image == 'true' }}
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_latest }}
            ${{ steps.meta.outputs.image_dev }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Scan image with Trivy
        if: needs.resolve.outputs.push_image == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: needs.resolve.outputs.push_image == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
        continue-on-error: true

      - name: Summary
        if: needs.resolve.outputs.push_image == 'true'
        run: |
          echo "### Pushed: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ steps.meta.outputs.image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
