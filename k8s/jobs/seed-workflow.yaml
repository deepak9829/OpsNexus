apiVersion: batch/v1
kind: Job
metadata:
  name: seed-workflow
  namespace: opsnexus
  labels:
    app: seed-workflow
    component: seed
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: seed-workflow
        component: seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: ${SEED_IMAGE_WORKFLOW}
          command: ["/seed"]
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
            - name: DB_NAME
              value: workflow_db
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
