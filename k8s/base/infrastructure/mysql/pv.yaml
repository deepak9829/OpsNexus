apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  namespace: opsnexus
spec:
  storageClassName: ""
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/opsnexus/mysql
    type: DirectoryOrCreate
  claimRef:
    namespace: opsnexus
    name: mysql-pvc
