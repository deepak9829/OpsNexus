apiVersion: batch/v1
kind: Job
metadata:
  name: localstack-init
  namespace: opsnexus
  labels:
    app: localstack-init
    component: infrastructure
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: localstack-init
        component: infrastructure
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-localstack
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for LocalStack to be ready..."
              until nc -z localstack 4566; do
                echo "LocalStack not ready yet, sleeping 2s..."
                sleep 2
              done
              echo "LocalStack is ready."
      containers:
        - name: create-dynamodb-tables
          image: amazon/aws-cli:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ENDPOINT_URL
              value: http://localstack:4566
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
          command:
            - sh
            - -c
            - |
              echo "Creating notifications table..."
              aws dynamodb create-table \
                --table-name notifications \
                --attribute-definitions \
                  AttributeName=tenantId,AttributeType=S \
                  AttributeName=notificationId,AttributeType=S \
                --key-schema \
                  AttributeName=tenantId,KeyType=HASH \
                  AttributeName=notificationId,KeyType=RANGE \
                --billing-mode PAY_PER_REQUEST \
                --endpoint-url http://localstack:4566 \
                --region us-east-1 || echo "notifications table may already exist, continuing..."

              echo "Creating audit_events table..."
              aws dynamodb create-table \
                --table-name audit_events \
                --attribute-definitions \
                  AttributeName=tenantId,AttributeType=S \
                  AttributeName=eventId,AttributeType=S \
                --key-schema \
                  AttributeName=tenantId,KeyType=HASH \
                  AttributeName=eventId,KeyType=RANGE \
                --billing-mode PAY_PER_REQUEST \
                --endpoint-url http://localstack:4566 \
                --region us-east-1 || echo "audit_events table may already exist, continuing..."

              echo "DynamoDB table initialization complete."
              aws dynamodb list-tables --endpoint-url http://localstack:4566 --region us-east-1
