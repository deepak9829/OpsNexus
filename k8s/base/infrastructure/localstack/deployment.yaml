apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: opsnexus
  labels:
    app: localstack
    component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: localstack
        component: infrastructure
    spec:
      containers:
        - name: localstack
          image: localstack/localstack-pro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: localstack
              containerPort: 4566
              protocol: TCP
          env:
            - name: SERVICES
              value: dynamodb
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: LOCALSTACK_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: opsnexus-secrets
                  key: localstack-auth-token
            - name: PERSISTENCE
              value: "1"
            - name: DATA_DIR
              value: /var/lib/localstack/data
          volumeMounts:
            - name: localstack-data
              mountPath: /var/lib/localstack
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: localstack-data
          persistentVolumeClaim:
            claimName: localstack-pvc
