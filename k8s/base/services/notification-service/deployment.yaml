apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: opsnexus
  annotations:
    # IRSA: pod assumes this role to call DynamoDB directly — no credentials in env.
    eks.amazonaws.com/role-arn: ${NOTIFICATION_IRSA_ROLE_ARN}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: opsnexus
  labels:
    app: notification-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: service
    spec:
      serviceAccountName: notification-service
      containers:
        - name: notification-service
          image: opsnexus/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
          env:
            - name: NOTIFICATION_SERVICE_PORT
              value: "8085"
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: DYNAMODB_NOTIFICATIONS_TABLE
              value: ${PROJECT_NAME}-${ENVIRONMENT}-notifications
            - name: DYNAMODB_AUDIT_TABLE
              value: ${PROJECT_NAME}-${ENVIRONMENT}-audit-events
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
