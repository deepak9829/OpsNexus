apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: opsnexus
  labels:
    app: document-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
        component: service
    spec:
      initContainers:
        - name: fetch-docdb-cert
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              curl -sSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem \
                -o /etc/ssl/docdb/global-bundle.pem
          volumeMounts:
            - name: docdb-certs
              mountPath: /etc/ssl/docdb
      containers:
        - name: document-service
          image: opsnexus/document-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:
            - name: DOCUMENT_SERVICE_PORT
              value: "8084"
            - name: DOCDB_HOST
              valueFrom:
                secretKeyRef:
                  name: docdb-secret
                  key: host
            - name: DOCDB_PORT
              valueFrom:
                secretKeyRef:
                  name: docdb-secret
                  key: port
            - name: DOCDB_USER
              valueFrom:
                secretKeyRef:
                  name: docdb-secret
                  key: username
            - name: DOCDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docdb-secret
                  key: password
            - name: DOCDB_TLS_CA_FILE
              value: /etc/ssl/docdb/global-bundle.pem
            - name: MONGO_DB_NAME
              value: documents_db
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: docdb-certs
              mountPath: /etc/ssl/docdb
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: docdb-certs
          emptyDir: {}
