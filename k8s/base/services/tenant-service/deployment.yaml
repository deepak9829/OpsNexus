apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: opsnexus
  labels:
    app: tenant-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
        component: service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              until nc -z mysql 3306; do
                echo "MySQL not ready yet, sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready."
      containers:
        - name: tenant-service
          image: opsnexus-tenant-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: TENANT_SERVICE_PORT
              value: "8082"
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: TENANT_DB_NAME
              value: tenant_db
            - name: TENANT_DB_USER
              value: tenant_user
            - name: TENANT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsnexus-secrets
                  key: tenant-db-password
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
