apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: opsnexus
  labels:
    app: tenant-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
        component: service
    spec:
      containers:
        - name: tenant-service
          image: opsnexus/tenant-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: TENANT_SERVICE_PORT
              value: "8082"
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: port
            - name: TENANT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: username
            - name: TENANT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
            - name: TENANT_DB_NAME
              value: tenant_db
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
