apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opsnexus
  labels:
    app: auth-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        component: service
    spec:
      containers:
        - name: auth-service
          image: opsnexus/auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: AUTH_SERVICE_PORT
              value: "8081"
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: host
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: port
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: username
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
            - name: AUTH_DB_NAME
              value: auth_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: JWT_ACCESS_TTL_MINUTES
              value: "15"
            - name: JWT_REFRESH_TTL_HOURS
              value: "168"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
