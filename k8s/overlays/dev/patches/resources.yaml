# Dev: smaller resource limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opsnexus
spec:
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
