apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: opsnexus
spec:
  template:
    spec:
      containers:
        - name: notification-service
          env:
            - name: DYNAMODB_TABLE_NOTIFICATIONS
              value: opsnexus-dev-notifications
            - name: DYNAMODB_TABLE_AUDIT
              value: opsnexus-dev-audit-events
            - name: AWS_REGION
              value: ap-south-1
            - name: ENVIRONMENT
              value: dev
