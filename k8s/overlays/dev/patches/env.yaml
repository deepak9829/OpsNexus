# Dev: point services to AWS RDS + DynamoDB instead of local infra
# These values are populated by Terraform outputs via CI/CD
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opsnexus
spec:
  template:
    spec:
      containers:
        - name: auth-service
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: opsnexus-aws-secrets
                  key: rds-endpoint
            - name: DB_NAME
              value: auth_db
            - name: ENVIRONMENT
              value: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: opsnexus
spec:
  template:
    spec:
      containers:
        - name: notification-service
          env:
            - name: DYNAMODB_TABLE_NOTIFICATIONS
              value: opsnexus-dev-notifications
            - name: DYNAMODB_TABLE_AUDIT
              value: opsnexus-dev-audit-events
            - name: AWS_REGION
              value: ap-southeast-1
            - name: ENVIRONMENT
              value: dev
