# Prod: production resource limits (right-sized for Graviton instances)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opsnexus
spec:
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
