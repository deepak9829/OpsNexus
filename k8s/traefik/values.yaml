## Traefik Helm values — OpsNexus
##
## Traffic flow:
##   Internet → API Gateway → VPC Link → NLB:80 → Traefik NodePort 30080
##   TLS terminates at API Gateway; traffic inside VPC is plain HTTP.

deployment:
  replicas: 2

service:
  type: NodePort

ports:
  web:
    port: 8000
    nodePort: 30080
    expose:
      default: true
  websecure:
    expose:
      default: false  # TLS handled by API Gateway, not Traefik

# Disable dashboard in non-local environments
ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
    namespaces: []
  kubernetesIngress:
    enabled: false

# Ping is moved to the web entrypoint (port 8000 / NodePort 30080) so the NLB
# health check (HTTP GET /ping on port 30080) gets a 200 response.
# The Helm chart's built-in liveness/readiness probes default to port 9000
# (traefik entrypoint) — override them to match where ping actually listens.
additionalArguments:
  - "--ping.entrypoint=web"

livenessProbe:
  httpGet:
    path: /ping
    port: 8000
  initialDelaySeconds: 2
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ping
    port: 8000
  initialDelaySeconds: 2
  periodSeconds: 10
  failureThreshold: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
