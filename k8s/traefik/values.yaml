## Traefik Helm values — OpsNexus
##
## Traffic flow:
##   Internet → API Gateway → VPC Link → NLB:80 → Traefik NodePort 30080
##   TLS terminates at API Gateway; traffic inside VPC is plain HTTP.

deployment:
  replicas: 2

service:
  type: NodePort

# NLB health check hits NodePort 30080 with GET /ping.
# Ping must be on the same entrypoint as web traffic — if left on the default
# "traefik" entrypoint (port 9000), the NLB never sees a healthy response.
ping:
  entryPoint: "web"

ports:
  web:
    port: 8000
    nodePort: 30080
    expose:
      default: true
  websecure:
    expose:
      default: false  # TLS handled by API Gateway, not Traefik

# Disable dashboard in non-local environments
ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
    namespaces: []
  kubernetesIngress:
    enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
