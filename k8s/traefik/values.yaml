## Traefik Helm values — OpsNexus
##
## Traffic flow:
##   Internet → API Gateway → VPC Link → NLB:80 → Traefik NodePort 30080
##   TLS terminates at API Gateway; traffic inside VPC is plain HTTP.

deployment:
  replicas: 2

service:
  type: NodePort

ports:
  traefik:
    port: 9000
    # Redirect k8s liveness/readiness probes to the web entrypoint where
    # --ping.entrypoint=web puts /ping. Without this the chart probes port 9000
    # (traefik entrypoint) which returns 404 after ping is moved.
    healthchecksPort: 8000
  web:
    port: 8000
    nodePort: 30080
    expose:
      default: true
  websecure:
    expose:
      default: false  # TLS terminates at API Gateway

# Disable dashboard in non-local environments
ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
    namespaces: []
  kubernetesIngress:
    enabled: false

# Ping is moved to the web entrypoint (port 8000 / NodePort 30080) so the NLB
# health check (HTTP GET /ping on port 30080) gets a 200 response.
# The Helm chart's built-in liveness/readiness probes default to port 9000
# (traefik entrypoint) — override them to match where ping actually listens.
additionalArguments:
  - "--ping.entrypoint=web"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
